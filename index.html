<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 ¡El Super-Reto de Historia de Pepa! 🌟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e0f7fa;
            background-image: radial-gradient(#b2ebf2 2px, transparent 2px);
            background-size: 40px 40px;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff5252;
            text-shadow: 4px 4px 0px #fff;
            font-size: 2.8em;
            margin-bottom: 15px;
            text-align: center;
        }

        #game-card {
            background: white;
            border: 8px solid #ffcc5c;
            border-radius: 50px;
            padding: 35px;
            box-shadow: 0 15px 0px #fbc02d;
            max-width: 750px;
            width: 95%;
            transition: all 0.3s ease;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-weight: 800;
            color: #4db6ac;
            font-size: 1.3em;
        }

        .question-box {
            background: #fff9c4;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            font-size: 1.5em;
            line-height: 1.3;
            color: #37474f;
            border: 3px dashed #ffb300;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .btn-opt {
            background: #ffffff;
            border: 4px solid #81d4fa;
            padding: 20px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: #0277bd;
            box-shadow: 0 6px 0 #81d4fa;
        }

        .btn-opt:hover:not(:disabled) {
            transform: translateY(-4px);
            background-color: #e1f5fe;
            border-color: #03a9f4;
            box-shadow: 0 10px 0 #03a9f4;
        }

        .btn-opt:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #03a9f4;
        }

        .correct {
            background-color: #a5d6a7 !important;
            border-color: #4caf50 !important;
            color: #1b5e20 !important;
            box-shadow: 0 6px 0 #2e7d32 !important;
        }

        .wrong {
            background-color: #ffab91 !important;
            border-color: #ff5722 !important;
            color: #bf360c !important;
            box-shadow: 0 6px 0 #d84315 !important;
        }

        #next-area {
            margin-top: 35px;
            text-align: center;
        }

        .btn-main {
            background: #ff5252;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.4em;
            border-radius: 60px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 8px 0 #c62828;
            display: none;
            transition: transform 0.2s;
        }

        .btn-main:hover {
            background: #ff1744;
            transform: scale(1.05);
        }

        #final-score {
            font-size: 2em;
            color: #ff5252;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .medal { font-size: 4em; margin-bottom: 15px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <h1>✨ ¡Historia con Pepa! ✨</h1>
    
    <div id="game-card">
        <div class="header-info">
            <span id="progress-text">Cargando...</span>
            <span>Puntos: <span id="score-val">0</span> 💎</span>
        </div>

        <div id="quiz-content">
            <div id="q-text" class="question-box"></div>
            <div id="opts" class="options-grid"></div>
        </div>

        <div id="final-score">
            <div class="medal">🎁</div>
            <div id="final-text"></div>
            <button class="btn-main" id="reset-btn" style="display:inline-block; margin-top:30px" onclick="startGame()">¡Jugar otra vez! 🚀</button>
        </div>

        <div id="next-area">
            <button class="btn-main" id="next-btn" onclick="goToNext()">¡Siguiente pregunta! 🎈</button>
        </div>
    </div>

    <script>
        const fullBank = [
            { q: "¿Qué factor fundamental permitió el incremento de las expediciones durante los siglos XV y XVI?", a: "Los avances de navegación", o: ["Nuevas rutas terrestres", "El uso de globos aerostáticos", "La falta de mapas"] },
            { q: "¿Cuál era la principal teoría geográfica que buscaba confirmar Cristóbal Colón?", a: "Demostrar que la Tierra era redonda", o: ["Que la Tierra era plana", "Que el sol giraba alrededor", "La existencia de la Antártida"] },
            { q: "¿Cuál fue la fecha exacta y el puerto de origen de la primera expedición?", a: "3 de agosto de 1492 desde el Puerto de Palos de la Frontera", o: ["12 de octubre desde Sevilla", "1 de enero desde Madrid", "3 de agosto desde Cádiz"] },
            { q: "¿Qué tres grandes civilizaciones poblaban América antes de los europeos?", a: "Aztecas, incas y mayas", o: ["Romanos, griegos y egipcios", "Vikingos y celtas", "Iberos y fenicios"] },
            { q: "¿Qué ciudades eran las capitales de los imperios azteca e inca?", a: "Tenochtitlán y Cuzco", o: ["Madrid y Roma", "Lima y México DF", "París y Londres"] },
            { q: "¿Qué tres plantas fueron introducidas en Europa desde América?", a: "Tomate, patatas o maíz", o: ["Trigo, arroz y cebada", "Seda, té y especias", "Manzanas y uvas"] },
            { q: "¿Qué nombres aparecen en tus notas sobre la caída de los imperios americanos?", a: "Felipe, Felipe IV y Carlos IV", o: ["Napoleón Bonaparte", "Julio César", "Don Quijote"] },
            { q: "¿Qué modelo territorial se usó para organizar el gobierno americano?", a: "Se organizó en dos virreinatos", o: ["En pequeños pueblos", "En una sola ciudad", "En comunidades autónomas"] },
            { q: "¿Cuál era el orden jerárquico exacto de la sociedad colonial (1º al 4º)?", a: "Española, mestiza, indígena y negra", o: ["Reyes, nobles, vasallos y esclavos", "Ricos y pobres solamente", "Soldados y clero"] },
            { q: "¿Qué modelo político se expandió al final de la Edad Media?", a: "Monarquía autoritaria", o: ["Democracia directa", "República federal", "Dictadura"] },
            { q: "¿Qué tres estrategias usaron los monarcas para fortalecer su poder?", a: "Ejércitos permanentes, diplomacia y más impuestos", o: ["Fiestas, viajes y regalos", "Bajar impuestos y quitar soldados", "Pedir permiso a los nobles"] },
            { q: "¿Cómo se dividían los grupos sociales en la Edad Moderna?", a: "Estamentos privilegiados y no privilegiados", o: ["Norte y Sur", "Ricos y humildes", "Equipos A y B"] },
            { q: "¿De qué dos ventajas disfrutaban la nobleza y el clero?", a: "No pagaban impuestos y tenían sus propias leyes", o: ["Tenían internet gratis", "No trabajaban nunca", "Viajaban gratis"] },
            { q: "¿Qué tres grupos integraban el estamento no privilegiado?", a: "Campesinos, comerciantes y artesanos", o: ["Reyes y obispos", "Solo caballeros", "Solo marineros"] },
            { q: "¿Qué grupo social ganó importancia gracias al comercio y la banca?", a: "La burguesía", o: ["Los vikingos", "Los monjes", "Los samuráis"] },
            { q: "¿Cuáles fueron las dos actividades económicas que más crecieron?", a: "El comercio y la banca", o: ["La caza y pesca", "La informática", "La minería de oro"] },
            { q: "¿Qué entidades surgieron para financiar a comerciantes y monarcas?", a: "Las bancas públicas", o: ["Las iglesias", "Los museos", "Los colegios"] },
            { q: "¿Cómo se llama la corriente de pensamiento de finales de la Edad Media?", a: "El Humanismo", o: ["El Feudalismo", "El Surrealismo", "El Modernismo"] },
            { q: "¿Quiénes eran los Reyes Católicos?", a: "Isabel de Castilla y Fernando", o: ["Carlos I y Juana", "Felipe II e Isabel", "Alfonso X"] },
            { q: "¿Qué medida militar tomaron los Reyes Católicos para consolidar su poder?", a: "Crear un ejército permanente", o: ["Cerrar los puertos", "Contratar piratas", "Hacer un muro"] },
            { q: "¿Por qué tenía Carlos I derecho al trono?", a: "Era el nieto de los Reyes Católicos", o: ["Era el hijo de Colón", "Era un primo lejano", "Era el rey de Francia"] },
            { q: "¿Qué generó conflictos tras la llegada de Carlos I?", a: "Sus costumbres extranjeras", o: ["Que no tenía dinero", "Que era muy bajo", "El mal tiempo"] },
            { q: "¿Qué logro territorial tuvo Felipe II?", a: "Amplió los territorios", o: ["Perdió todas las tierras", "Se quedó solo en Madrid", "Descubrió la Luna"] },
            { q: "¿Qué dos monarcas gobernaron entre los Reyes Católicos y Carlos II?", a: "Carlos I y Felipe II", o: ["Felipe V y Carlos III", "Isabel II", "Alfonso XII"] },
            { q: "¿Qué decisión militar tomaron Felipe III o Carlos II en el siglo XVII?", a: "Renunciaron al ejército", o: ["Crearon los tanques", "Invadieron Asia", "Hicieron murallas"] },
            { q: "¿Cómo se llamaba a las personas de confianza de los reyes?", a: "Los validos", o: ["Los secretarios", "Los guardaespaldas", "Los consejeros"] },
            { q: "¿Qué cuatro factores causaron la crisis del siglo XVII?", a: "Guerras, pobreza, malas cosechas y poco comercio", o: ["Falta de barcos", "Lluvia de meteoritos", "Exceso de oro"] },
            { q: "¿Qué pasó tras la muerte de Carlos II en 1700?", a: "Murió sin hijos y hubo dudas sobre Felipe V", o: ["España se partió en dos", "Vino un rey de China", "Se acabó el país"] },
            { q: "¿Qué guerra causó la elección de Felipe de Borbón?", a: "La Guerra de Sucesión", o: ["La Guerra de los Cien Años", "La Guerra de Independencia", "La Guerra Civil"] },
            { q: "¿En qué año terminó la Guerra de Sucesión y qué dinastía empezó?", a: "En 1713, la dinastía Borbón", o: ["En 1492, los Austrias", "En 1800, los Romanov", "En 1900"] },
            { q: "¿Qué cuatro monarcas gobernaron en el siglo XVIII?", a: "Felipe V, Fernando VI, Carlos III y Carlos IV", o: ["Solo Carlos I", "Los Reyes Católicos", "Isabel II"] },
            { q: "¿Qué tipo de gobierno instauraron los Borbones?", a: "Gobierno absolutista", o: ["Democracia", "República", "Anarquía"] },
            { q: "¿Qué dos territorios mantuvieron sus leyes propias?", a: "Navarra y el País Vasco", o: ["Madrid y Cataluña", "Andalucía y Galicia", "Valencia"] },
            { q: "Nombra tres reformas económicas de los Borbones.", a: "Manufacturas, carreteras y canales", o: ["Aviones y trenes", "Internet", "Solo caza"] },
            { q: "¿Qué era la Ilustración?", a: "La razón como la luz del conocimiento", o: ["Un tipo de pintura", "Una noche oscura", "Un cuento"] },
            { q: "¿Qué rey fue el máximo representante del despotismo ilustrado?", a: "Carlos III", o: ["Felipe V", "Carlos I", "Fernando VII"] },
            { q: "¿Qué defendía la ciencia del siglo XVII?", a: "La experimentación y la razón", o: ["La magia y hechizos", "La suerte", "Los mitos antiguos"] },
            { q: "¿Qué teoría confirmó Galileo Galilei?", a: "La teoría heliocentrista", o: ["Que la Tierra es plana", "Que el sol gira alrededor", "Que no hay estrellas"] },
            { q: "¿Qué dos grandes hallazgos tuvo Isaac Newton?", a: "La gravedad universal y los colores de la luz", o: ["El fuego y la rueda", "La electricidad", "El coche"] },
            { q: "¿Qué descubrió el microscopio de Leeuwenhoek?", a: "La vida de los seres microscópicos", o: ["Las estrellas", "El pasado", "El fondo del mar"] },
            { q: "¿Qué dos estilos artísticos hubo en la Edad Moderna?", a: "El Renacimiento y el Barroco", o: ["Gótico y Románico", "Cubismo", "Modernismo"] },
            { q: "Menciona tres características del Renacimiento.", a: "El ser humano, la belleza y la simetría", o: ["El caos y desorden", "Colores negros", "Cosas abstractas"] },
            { q: "¿Qué dos elementos destacan en el Barroco?", a: "Mucha decoración y dramatismo", o: ["Líneas rectas y simplicidad", "Solo color blanco", "Dibujos de palos"] },
            { q: "¿Por qué se llamaba 'Siglo de Oro'?", a: "Por su esplendor artístico y literario", o: ["Porque todo era de oro real", "Porque duró mil años", "Por las medallas"] },
            { q: "Cita tres pintores famosos del Siglo de Oro.", a: "Velázquez, Zurbarán o Murillo", o: ["Picasso y Dalí", "Goya", "Leonardo"] },
            { q: "¿Quién destaca en literatura y qué obra escribió?", a: "Miguel de Cervantes y El Quijote", o: ["Harry Potter", "Quevedo", "Góngora"] }
        ];

        let currentSelected = [];
        let currentIdx = 0;
        let score = 0;
        let canAnswer = true;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type==='win'){
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // Algoritmo Fisher-Yates para mezcla perfecta
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            score = 0;
            currentIdx = 0;
            document.getElementById('score-val').innerText = score;
            document.getElementById('final-score').style.display = 'none';
            document.getElementById('quiz-content').style.display = 'block';
            
            // Barajamos todo el banco y cogemos las primeras 10
            const shuffledFull = shuffleArray([...fullBank]);
            currentSelected = shuffledFull.slice(0, 10);
            
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const qData = currentSelected[currentIdx];
            document.getElementById('progress-text').innerText = `Pregunta ${currentIdx + 1} de 10`;
            document.getElementById('q-text').innerText = qData.q;
            document.getElementById('next-btn').style.display = 'none';
            
            const optsDiv = document.getElementById('opts');
            optsDiv.innerHTML = '';

            // Barajamos también las opciones
            const mixedOpts = shuffleArray([qData.a, ...qData.o]);
            mixedOpts.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'btn-opt';
                b.innerText = txt;
                b.onclick = () => handleAnswer(txt === qData.a, b);
                optsDiv.appendChild(b);
            });
        }

        function handleAnswer(isCorrect, btn) {
            if (!canAnswer) return;
            canAnswer = false;
            
            const buttons = document.querySelectorAll('.btn-opt');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                playSound('win');
                btn.classList.add('correct');
                score++;
                document.getElementById('score-val').innerText = score;
            } else {
                playSound('lose');
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if (b.innerText === currentSelected[currentIdx].a) b.classList.add('correct');
                });
            }
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function goToNext() {
            currentIdx++;
            if (currentIdx < 10) {
                showQuestion();
            } else {
                showEnd();
            }
        }

        function showEnd() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('final-score').style.display = 'flex';
            document.getElementById('progress-text').innerText = "¡Misión terminada!";
            
            let emoji = score >= 8 ? "🏆" : (score >= 5 ? "⭐" : "💪");
            let msg = score >= 8 ? "¡Increíble! Eres una maestra de la Historia." : 
                      (score >= 5 ? "¡Muy bien! Sigue así y serás invencible." : "¡Buen intento! Repasa un poquito más y verás cómo mejoras.");
            
            document.querySelector('.medal').innerText = emoji;
            document.getElementById('final-text').innerHTML = `<h2>Resultado Final</h2><h1>${score} / 10</h1><p>${msg}</p>`;
        }

        window.onload = startGame;
    </script>
</body>
</html>
